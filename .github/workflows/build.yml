name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk PiBrainChat.apk

      - name: Delete existing release if any
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest-debug --yes --repo physicistmanoj/PiBrainChat || true

      - name: Create GitHub Release with APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest-debug PiBrainChat.apk \
            --title "PiBrainChat — Latest Debug APK" \
            --notes "Claude + Gemini in one Android shell. Install directly on your phone." \
            --repo physicistmanoj/PiBrainChat
          echo ""
          echo "========================================"
          echo "APK DOWNLOAD:"
          echo "https://github.com/physicistmanoj/PiBrainChat/releases/download/latest-debug/PiBrainChat.apk"
          echo "========================================"
