name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PiBrainChat-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Publish public download link
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          echo "Uploading to file.io..."
          RESPONSE=$(curl -s -F "file=@${APK}" https://file.io/?expires=7d)
          echo "file.io response: $RESPONSE"
          URL=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('link','FAILED'))")
          echo ""
          echo "========================================"
          echo "APK DIRECT DOWNLOAD: $URL"
          echo "========================================"
